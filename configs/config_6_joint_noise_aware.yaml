extends: base.yaml

experiment:
  id: 6
  name: "config_6_joint_noise_aware"
  description: "PubMedBERT + joint training with noise-aware sample weighting (gold=1.0, silver=0.3)."

model:
  backbone: "microsoft/BiomedNLP-PubMedBERT-base-uncased-abstract-fulltext"
  num_labels: 9

data:
  label_space: "9tag"
  train_sources:
    - name: "bc5cdr_train"
      path: "dataset/bc5cdr/bc5cdr_train.jsonl"
      label_field: "decoded_tags_pseudo_final"
      source_tag: "gold"
    - name: "pubmed_silver"
      path: "dataset/pubmed/pubmed_scrapping.jsonl"
      label_field: "decoded_tags_pseudo_final"
      source_tag: "silver"
  validation_source:
    name: "bc5cdr_validation"
    path: "dataset/bc5cdr/bc5cdr_validation.jsonl"
    label_field: "decoded_tags_pseudo_final"
    source_tag: "gold"
  test_sources:
    - name: "test_bc5cdr"
      path: "dataset/bc5cdr/bc5cdr_test.jsonl"
      label_field: "decoded_tags"
      source_tag: "gold"
    - name: "test_pubmed"
      path: "dataset/pubmed/pubmed_test.jsonl"
      label_field: "decoded_tags_pseudo_final"
      source_tag: "gold"

training:
  strategy: "joint_noise_aware"
  source_weights:
    gold: 1.0
    silver: 0.3

evaluation:
  test_sets_to_evaluate: ["test_bc5cdr", "test_pubmed"]
