extends: base.yaml

experiment:
  id: 1
  name: "config_1_bert_base"
  description: "BERT-base + BC5CDR (Chemical + Disease only). Lower-bound baseline."

model:
  backbone: "bert-base-uncased"
  num_labels: 5

data:
  label_space: "5tag"
  train_sources:
    - name: "bc5cdr_train"
      path: "dataset/bc5cdr/bc5cdr_train.jsonl"
      label_field: "decoded_tags"
      source_tag: "gold"
  validation_source:
    name: "bc5cdr_validation"
    path: "dataset/bc5cdr/bc5cdr_validation.jsonl"
    label_field: "decoded_tags"
    source_tag: "gold"
  test_sources:
    - name: "test_bc5cdr"
      path: "dataset/bc5cdr/bc5cdr_test.jsonl"
      label_field: "decoded_tags"
      source_tag: "gold"

training:
  strategy: "single"

evaluation:
  test_sets_to_evaluate: ["test_bc5cdr"]
