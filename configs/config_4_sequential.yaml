experiment:
  id: 4
  name: "config_4_sequential"
  description: "PubMedBERT + sequential fine-tuning (BC5CDR phase 1, silver phase 2). 4-entity coverage."

model:
  backbone: "microsoft/BiomedNLP-PubMedBERT-base-uncased-abstract-fulltext"
  num_labels: 9
  max_length: 512

data:
  label_space: "9tag"
  train_sources:
    - name: "bc5cdr_train_phase1"
      path: "dataset/bc5cdr/bc5cdr_train.jsonl"
      label_field: "decoded_tags"
      source_tag: "gold"
    - name: "pubmed_silver_phase2"
      path: "dataset/pubmed/pubmed_scrapping.jsonl"
      label_field: "decoded_tags_pseudo_final"
      source_tag: "silver"
  validation_source:
    name: "bc5cdr_validation"
    path: "dataset/bc5cdr/bc5cdr_validation.jsonl"
    label_field: "decoded_tags_pseudo_final"
    source_tag: "gold"
  test_sources:
    - name: "test_bc5cdr"
      path: "dataset/bc5cdr/bc5cdr_test.jsonl"
      label_field: "decoded_tags"
      source_tag: "gold"
    - name: "test_pubmed"
      path: "dataset/pubmed/pubmed_test.jsonl"
      label_field: "decoded_tags_pseudo_final"
      source_tag: "gold"

training:
  strategy: "sequential"
  batch_size: 16
  gradient_accumulation_steps: 1
  learning_rate: 2.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  lr_scheduler_type: "linear"
  fp16: true
  gradient_checkpointing: false
  phase1:
    train_source: "bc5cdr_train_phase1"
    validation_source: "bc5cdr_validation"
    epochs: 3
    learning_rate: 2.0e-5
  phase2:
    train_source: "pubmed_silver_phase2"
    validation_source: "bc5cdr_validation"
    epochs: 3
    learning_rate: 1.0e-5
    load_from_phase1: true

evaluation:
  metrics: ["precision", "recall", "f1"]
  per_entity: true
  test_sets_to_evaluate: ["test_bc5cdr", "test_pubmed"]

output:
  base_dir: "outputs"
  save_total_limit: 2
  logging_steps: 50
  eval_steps: 0
  save_strategy: "best"

seed: 42

runtime:
  num_workers: 4
  pin_memory: true
  device: "auto"
