extends: base.yaml

experiment:
  id: 2
  name: "config_2_biobert"
  description: "BioBERT + BC5CDR. Domain-specific baseline (Chemical + Disease only)."

model:
  backbone: "dmis-lab/biobert-base-cased-v1.2"
  num_labels: 5

data:
  label_space: "5tag"
  train_sources:
    - name: "bc5cdr_train"
      path: "dataset/bc5cdr/bc5cdr_train.jsonl"
      label_field: "decoded_tags"
      source_tag: "gold"
  validation_source:
    name: "bc5cdr_validation"
    path: "dataset/bc5cdr/bc5cdr_validation.jsonl"
    label_field: "decoded_tags"
    source_tag: "gold"
  test_sources:
    - name: "test_bc5cdr"
      path: "dataset/bc5cdr/bc5cdr_test.jsonl"
      label_field: "decoded_tags"
      source_tag: "gold"

training:
  strategy: "single"

evaluation:
  test_sets_to_evaluate: ["test_bc5cdr"]
