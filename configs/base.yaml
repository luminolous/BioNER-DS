# base.yaml

model:
  max_length: 512

training:
  epochs: 5
  batch_size: 32
  gradient_accumulation_steps: 1
  learning_rate: 2.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  lr_scheduler_type: "linear"
  fp16: true
  gradient_checkpointing: false

evaluation:
  metrics: ["precision", "recall", "f1"]
  per_entity: true

output:
  base_dir: "outputs"
  save_total_limit: 2
  logging_steps: 50
  eval_steps: 0
  save_strategy: "best"

seed: 42

runtime:
  num_workers: 4
  pin_memory: true
  device: "auto"
